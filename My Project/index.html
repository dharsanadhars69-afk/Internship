<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Challenge Community - Login</title>

    <link rel="stylesheet" href="login.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="login-container">

    <!-- Left Side -->

    <div class="login-left">

        <div class="logo">
            <i class="fas fa-dumbbell"></i>
        </div>

        <h1>Fitness Challenge Community</h1>

        <p>
            Track your workouts, complete challenges,
            improve your health and stay motivated every day.
        </p>

        <div class="feature-list">

            <div class="feature">
                <i class="fas fa-fire"></i>
                <span>Daily Streaks</span>
            </div>

            <div class="feature">
                <i class="fas fa-trophy"></i>
                <span>Challenges</span>
            </div>

            <div class="feature">
                <i class="fas fa-heart"></i>
                <span>Healthy Lifestyle</span>
            </div>

        </div>

    </div>

    <!-- Right Side -->

    <div class="login-right">

        <div class="login-box">

            <h2>Welcome Back</h2>

            <p>Login to continue your fitness journey.</p>

            <div class="input-group">

                <label>Email</label>

                <input
                type="email"
                id="email"
                placeholder="Enter your email">

            </div>

            <div class="input-group">

                <label>Password</label>

                <div class="password-box">

                    <input
                    type="password"
                    id="password"
                    placeholder="Enter your password">

                    <button
                    type="button"
                    class="eye-btn"
                    onclick="togglePassword()">

                        <i class="fa-solid fa-eye"></i>

                    </button>

                </div>

            </div>

            <div class="remember">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

            </div>

            <button class="login-btn" onclick="login()">

                Login

            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>

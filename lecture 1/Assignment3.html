<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block vs Inline</title>
</head>
<body>
    <h2>Block Element(div)</h2>
    
    <div>1st div</div>
    <div>2nd div</div>
    <div>3rd div</div>

    <h2>Inline Element(span)</h2>
    <span>1st Span</span>
    <span>2nd Span</span>
    <span>3rd Span</span>

    <h2>Observation</h2>
<ol>
    <li>
    <p>Div is a block element</p>
    </li>
    <li>
    <p>Each div starts a new line.</p>
    </li>
    <li>
    <p>Span is a Inline Element</p>
    </li>
    <li>
    <p>All span element appear on the same line</p>
    </li>
    </ol>

    

</body>
</html>

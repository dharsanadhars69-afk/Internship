<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Dashboard Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#121212;
    color:white;
}

.container{
    display:flex;
    min-height:100vh;
}

/* Sidebar */
.sidebar{
    width:250px;
    background:#000;
    padding:20px;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#1DB954;
    margin-bottom:30px;
}

.menu{
    list-style:none;
}

.menu li{
    padding:15px;
    margin-bottom:10px;
    background:#181818;
    border-radius:8px;
    cursor:pointer;
}

.menu li:hover{
    background:#1DB954;
}

/* Main Content */
.main{
    flex:1;
    padding:20px;
}

.section-title{
    margin-bottom:20px;
}

/* Song Cards */
.cards{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    margin-bottom:40px;
}

.card{
    background:#181818;
    padding:20px;
    border-radius:10px;
    flex:1 1 200px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    background:#282828;
}

.card img{
    width:100%;
    border-radius:10px;
    margin-bottom:10px;
}

.card h3{
    margin-bottom:5px;
}

.card p{
    color:#bbb;
}

/* Responsive */
@media(max-width:768px){

    .container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">Spotify</div>

        <ul class="menu">
            <li>🏠 Home</li>
            <li>🔍 Search</li>
            <li>🎵 Library</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <h2 class="section-title">🔥 Trending Songs</h2>

        <div class="cards">

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Believer</h3>
                <p>Imagine Dragons</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Shape of You</h3>
                <p>Ed Sheeran</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Levitating</h3>
                <p>Dua Lipa</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Blinding Lights</h3>
                <p>The Weeknd</p>
            </div>

        </div>

        <h2 class="section-title">🎧 Recently Played</h2>

        <div class="cards">

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Perfect</h3>
                <p>Ed Sheeran</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Stay</h3>
                <p>Justin Bieber</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Heat Waves</h3>
                <p>Glass Animals</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/200" alt="">
                <h3>Calm Down</h3>
                <p>Rema</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College ERP Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f7fa;
}

.sidebar{
    min-height:100vh;
    background:#031e47;
}

.sidebar a{
    color:white;
    text-decoration:none;
    display:block;
    padding:12px;
    border-radius:8px;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.2);
}

.stat-card{
    transition:0.3s;
}

.stat-card:hover{
    transform:translateY(-5px);
}

.student-card img{
    width:80px;
    height:80px;
    object-fit:cover;
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

    <!-- Sidebar -->
    <div class="col-lg-2 col-md-3 sidebar p-3">
        <h3 class="text-white text-center mb-4">College ERP</h3>

        <a href="#">Dashboard</a>
        <a href="#">Students</a>
        <a href="#">Faculty</a>
        <a href="#">Courses</a>
        <a href="#">Attendance</a>
        <a href="#">Exams</a>
        <a href="#">Settings</a>
    </div>

    <!-- Main Content -->
    <div class="col-lg-10 col-md-9">

        <!-- Navbar -->
        <nav class="navbar navbar-light bg-white shadow-sm px-3">
            <span class="navbar-brand mb-0 h4">
                College Management Dashboard
            </span>

            <button class="btn btn-primary">
                Admin
            </button>
        </nav>

        <div class="p-4">

            <!-- Statistics Cards -->
            <div class="row g-4 mb-4">

                <div class="col-md-4">
                    <div class="card stat-card shadow-sm">
                        <div class="card-body text-center">
                            <h5>Total Students</h5>
                            <h2>1,250</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card stat-card shadow-sm">
                        <div class="card-body text-center">
                            <h5>Faculty Members</h5>
                            <h2>85</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card stat-card shadow-sm">
                        <div class="card-body text-center">
                            <h5>Courses</h5>
                            <h2>42</h2>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Student Cards -->
            <h4 class="mb-3">Top Students</h4>

            <div class="row g-4">

                <div class="col-md-4">
                    <div class="card student-card shadow-sm">
                        <div class="card-body text-center">
                            <img src="https://randomuser.me/api/portraits/women/44.jpg" class="rounded-circle mb-3">
                            <h5>Ananya</h5>
                            <p>B.Sc Computer Science</p>
                            <p>Roll No 101</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card student-card shadow-sm">
                        <div class="card-body text-center">
                            <img src="https://randomuser.me/api/portraits/men/32.jpg" class="rounded-circle mb-3">
                            <h5>Rahul</h5>
                            <p>BCA</p>
                            <p>Roll No 102</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card student-card shadow-sm">
                        <div class="card-body text-center">
                            <img src="https://randomuser.me/api/portraits/women/68.jpg" class="rounded-circle mb-3">
                            <h5>Priya</h5>
                            <p>B.Tech IT</p>
                            <p>Roll No 103</p>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

</div>
</div>

</body>
</html>
